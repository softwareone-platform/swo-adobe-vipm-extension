# All configuration for plugins
# and other utils is defined here and in `pyproject.toml`

# === Linter configuration ===


# NOTE: You can use https://pypi.org/project/Flake8-pyproject/
# to move all your `flake8` configuration to `pyproject.toml`

[flake8]
# Base flake8 configuration:
# https://flake8.pycqa.org/en/latest/user/configuration.html
format = wemake
show-source = true
statistics = false
doctests = true

# Self settings:
max-imports = 17

# Excluding some directories:
extend-exclude =
  .venv

# We only run `wemake-python-styleguide` with `flake8`:
select = WPS, E999

# TODO: remove one day
per-file-ignores =
  tests/**/*.py: WPS
  tests/*.py: WPS
  adobe_vipm/adobe/validation.py: WPS202
  adobe_vipm/adobe/utils.py: WPS100
  adobe_vipm/adobe/mixins/order.py: WPS211 WPS226 WPS210 WPS214 WPS204
  adobe_vipm/adobe/mixins/customer.py: WPS114 WPS226 WPS210
  adobe_vipm/adobe/errors.py: WPS202
  adobe_vipm/adobe/constants.py: WPS114
  adobe_vipm/adobe/config.py: WPS122 WPS121 WPS214
  adobe_vipm/adobe/client.py: WPS122 WPS121 WPS215

version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    versioning-strategy: "auto"
    groups:
      python-production:
        dependency-type: "production"
      python-development:
        dependency-type: "development"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "django"
        versions: ["*"]
      # This repo must stay on mpt-extension-sdk 5.x: the 6.x line requires
      # mpt-api-client 6.3.* which is incompatible with mpt-tool 6.0.* (needs
      # mpt-api-client 5.4.*), so a 6.x bump is unresolvable and must never be
      # selected.
      - dependency-name: "mpt-extension-sdk"
        versions: [">=6"]
      # mpt-extension-sdk 5.22.* pins requests==2.33.*, so a newer requests is
      # unresolvable until the sdk lifts that cap.
      - dependency-name: "requests"
        versions: [">=2.34"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5

services:
  app:
    command: "uv run swoext run --local"
    depends_on:
      jaeger:
        condition: service_started
      wiremock:
        condition: service_started
    env_file:
      - .env
      - .env.local

  wiremock:
    image: wiremock/wiremock:3.13.2
    ports:
      - "8081:8080"
    volumes:
      - ./peripherals/wiremock/extensions:/var/wiremock/extensions
      - ./peripherals/wiremock/__files:/home/wiremock/__files
      - ./peripherals/wiremock/mappings:/home/wiremock/mappings
    entrypoint: [ "/docker-entrypoint.sh", "--enable-browser-proxying"]
